name: Generate organization profile assets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - profile/README.md
      - scripts/**
      - package.json
      - .github/workflows/profile-assets.yml
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: write

jobs:
  generate:
    name: Build SVG profile assets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate and generate assets
        run: npm run check

      - name: Publish assets to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
